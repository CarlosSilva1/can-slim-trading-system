universe:
  source: "SP500"
  min_market_cap: 10000000000
  min_avg_volume: 1000000

rs_rating:
  weights:
    12m: 0.4
    9m: 0.2
    6m: 0.2
    3m: 0.2
  min_threshold: 80

market_pulse:
  index: "^GSPC"
  ma_short: 50
  ma_long: 200
  breadth_threshold: 55

pivot:
  lookback: 50
  min_depth: 0.12
  max_depth: 0.45
  buy_point_buffer: 0.05

breakout:
  volume_multiplier: 1.5
  confirmation_bars: 1

filters:
  strict_mode: true
  market_required: "UPTREND"
  min_rs: 80
